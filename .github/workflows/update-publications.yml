name: Update publications

# Runs on the 1st of every month (00:15 UTC) and on demand from the Actions tab.
on:
  schedule:
    - cron: "15 0 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the site
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch new publications from OpenAlex
        env:
          OPENALEX_MAILTO: ${{ secrets.OPENALEX_MAILTO }}
        run: python scripts/update_publications.py

      - name: Commit changes (if any)
        run: |
          git config user.name  "4LLab publications bot"
          git config user.email "actions@github.com"
          if [ -n "$(git status --porcelain publications.html publications.rss)" ]; then
            git add publications.html publications.rss
            git commit -m "Auto-update publications ($(date +%Y-%m-%d))"
            git push
          else
            echo "No new publications this run."
          fi
